<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xiaoqin Outdoor - CMS 后台管理</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --card: #fff;
      --border: #e2e5ea;
      --text: #1a1a2e;
      --text2: #555770;
      --primary: #1a5632;
      --accent: #e8731a;
      --danger: #dc2626;
      --success: #16a34a;
      --radius: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    
    /* Login */
    .login-screen {
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
      background: linear-gradient(135deg, #0a2a16, #1a5632);
    }
    .login-card {
      background: white; padding: 3rem; border-radius: 12px; width: 400px; max-width: 90vw;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .login-card h1 { font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center; color: var(--primary); }
    .login-card input { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: var(--radius); font-size: 1rem; margin-bottom: 1rem; }
    .login-card button { width: 100%; padding: 0.75rem; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-size: 1rem; font-weight: 600; cursor: pointer; }
    .login-card .error { color: var(--danger); font-size: 0.85rem; margin-bottom: 0.5rem; text-align: center; }

    /* Dashboard */
    .hidden { display: none !important; }
    .dashboard { display: flex; min-height: 100vh; }
    .sidebar {
      width: 220px; background: var(--primary); color: white; padding: 1.5rem 0;
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    .sidebar h2 { padding: 0 1.5rem 1rem; font-size: 1.1rem; border-bottom: 1px solid rgba(255,255,255,0.15); margin-bottom: 1rem; }
    .sidebar a {
      display: block; padding: 0.6rem 1.5rem; color: rgba(255,255,255,0.7);
      text-decoration: none; font-size: 0.9rem; transition: 0.2s; cursor: pointer;
    }
    .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.1); color: white; }
    .sidebar a .icon { margin-right: 8px; }
    .main { flex: 1; padding: 2rem; overflow-y: auto; }

    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .header h2 { font-size: 1.4rem; }
    .header-btns { display: flex; gap: 0.5rem; }
    .btn {
      padding: 0.5rem 1.25rem; border-radius: var(--radius); font-size: 0.9rem;
      font-weight: 600; border: none; cursor: pointer; transition: 0.2s;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-success { background: var(--success); color: white; }
    .btn-outline { background: white; border: 1px solid var(--border); color: var(--text); }
    .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.8rem; }

    /* Cards */
    .card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 1rem; }
    .card h3 { font-size: 1rem; margin-bottom: 1rem; }
    
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.35rem; color: var(--text2); }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 0.6rem; border: 1px solid var(--border); border-radius: 4px;
      font-size: 0.9rem; font-family: inherit;
    }
    .form-group textarea { resize: vertical; min-height: 60px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }

    .product-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .product-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.75rem 1rem; background: white; border: 1px solid var(--border);
      border-radius: var(--radius); cursor: pointer; transition: 0.2s;
    }
    .product-item:hover { border-color: var(--primary); background: rgba(26,86,50,0.03); }
    .product-item .name { font-weight: 600; }
    .product-item .spec { font-size: 0.8rem; color: var(--text2); }

    .toast {
      position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 1.5rem;
      border-radius: var(--radius); color: white; font-weight: 600; z-index: 999;
      animation: slideIn 0.3s ease;
    }
    .toast-success { background: var(--success); }
    .toast-error { background: var(--danger); }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .image-preview { max-width: 200px; max-height: 150px; border-radius: 4px; margin-top: 0.5rem; border: 1px solid var(--border); }

    @media (max-width: 768px) {
      .dashboard { flex-direction: column; }
      .sidebar { width: 100%; flex-direction: row; overflow-x: auto; padding: 0.5rem; }
      .sidebar h2 { display: none; }
      .sidebar a { padding: 0.5rem 0.75rem; white-space: nowrap; font-size: 0.8rem; }
      .form-row, .form-row-3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <h1>Xiaoqin Outdoor</h1>
    <div class="error" id="loginError"></div>
    <input type="password" id="adminPassword" placeholder="管理员密码" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">进入后台</button>
    <p style="text-align:center;margin-top:1rem;font-size:0.8rem;color:#888;" id="setupHint"></p>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="dashboard hidden">
  <nav class="sidebar">
    <h2>CMS 后台</h2>
    <a class="active" onclick="showTab('products')"><span class="icon">📦</span> 产品管理</a>
    <a onclick="showTab('pages')"><span class="icon">📄</span> 页面内容</a>
    <a onclick="showTab('images')"><span class="icon">🖼️</span> 图片管理</a>
    <a onclick="showTab('settings')"><span class="icon">⚙️</span> 设置</a>
  </nav>
  <div class="main">
    <div class="header">
      <h2 id="tabTitle">产品管理</h2>
      <div class="header-btns">
        <button class="btn btn-outline btn-sm" onclick="saveAllChanges()">💾 保存修改</button>
        <button class="btn btn-success btn-sm" onclick="deployNow()">🚀 立即部署</button>
        <button class="btn btn-outline btn-sm" onclick="logout()">退出</button>
      </div>
    </div>
    <div id="tabContent"></div>
  </div>
</div>

<script src="admin.js"></script>
</body>
</html>
